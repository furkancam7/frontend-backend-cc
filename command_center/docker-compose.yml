version: '3.8'

services:
  postgres:
    image: postgres:15.4-alpine
    container_name: cc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-command_center}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-TurkAI2026_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./Database/init_heartbeat.sql:/docker-entrypoint-initdb.d/02_heartbeat.sql:ro
      - ./Database/init_detections.sql:/docker-entrypoint-initdb.d/03_detections.sql:ro
      - ./Database/init_remote_management.sql:/docker-entrypoint-initdb.d/04_remote_management.sql:ro
    ports:
      - "5434:5432"
    networks:
      - app_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: cc_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-TurkAI2026_minio}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - app_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  mosquitto:
    image: eclipse-mosquitto:2.0.18
    container_name: cc_mosquitto
    restart: unless-stopped
    volumes:
      - ./docker/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./docker/mosquitto/passwd:/mosquitto/config/passwd:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
      - "8883:8883"
    networks:
      - app_network
    healthcheck:
      test: [ "CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-u", "TurkAI", "-P", "TurkAI" ]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: cc_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      ENVIRONMENT: production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-command_center}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-TurkAI2026_db}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-TurkAI2026_minio}
      MINIO_BUCKET_IMAGES: images
      MINIO_BUCKET_LOGS: logs
      MINIO_SECURE: "false"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-your-super-secret-jwt-key-change-me}
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: 10080
      JWT_REFRESH_EXPIRE_DAYS: 30
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_USERNAME: TurkAI
      MQTT_PASSWORD: TurkAI
      MQTT_TLS_ENABLED: "false"
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DEBUG: "false"
      CORS_ORIGINS: ${CORS_ORIGINS:-https://dashboard.roboteye.ai,https://dashboard-api.roboteye.ai,http://localhost:3000}
    networks:
      - app_network
    expose:
      - "8000"

  mqtt-receiver:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: cc_mqtt_receiver
    restart: unless-stopped
    command: [ "python", "mqtt/mqtt_receiver.py" ]
    depends_on:
      - backend
      - mosquitto
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-command_center}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-TurkAI2026_db}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-TurkAI2026_minio}
      MQTT_BROKER: mosquitto
      MQTT_PORT: 1883
      MQTT_USERNAME: TurkAI
      MQTT_PASSWORD: TurkAI
      MQTT_TLS_ENABLED: "false"
    networks:
      - app_network

  nginx:
    build:
      context: ../dashboard
      dockerfile: Dockerfile
      network: host
    container_name: cc_nginx
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - app_network

  certbot:
    image: certbot/certbot:v2.7.4
    container_name: cc_certbot
    volumes:
      - ./docker/certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

networks:
  app_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
  mosquitto_data:
  mosquitto_log:
  certbot_www:
